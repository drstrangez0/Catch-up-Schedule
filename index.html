<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Saudi National Catch-up Vaccination Schedule Generator.">
  <title>Catch-up Vaccination Schedule</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
  <div class="app-container">
    <header>
      <h1>Catch-up Schedule</h1>
      <p> Done by Abduleleh Alharbi </p>
    </header>

    <main>
      <div class="controls-card">
        <div class="input-row">
          <div class="input-col">
            <label for="patient-age">Patient Age (in months):</label>
            <input type="number" id="patient-age" min="0" max="216" placeholder="e.g. 15">
          </div>
          <div class="input-col">
            <label for="last-schedule">Last Vaccine Taken:</label>
            <select id="last-schedule">
              <option value="None">None (0 Doses)</option>
              <option value="Birth">Birth Vaccines</option>
              <option value="2m">2 Months</option>
              <option value="4m">4 Months</option>
              <option value="6m">6 Months</option>
              <option value="9m">9 Months</option>
              <option value="12m">12 Months</option>
              <option value="18m">18 Months</option>
              <option value="24m">24 Months</option>
              <option value="4y">4-6 Years</option>
              <option value="11y">11 Years</option>
              <option value="12y">12 Years</option>
            </select>
          </div>
        </div>
        <button id="generate-btn">Generate Schedule</button>
      </div>

      <div id="timeline-container" style="display: none;">
        <!-- Chronological month cards will be injected here -->
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>

</html>
